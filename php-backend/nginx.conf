# ============================================================
# AI 文字冒险 - WSToolbox Nginx 配置
#
# 功能：
# - root 指向 public 目录
# - PHP-FPM 处理 .php 文件
# - URL 重写到 index.php（支持 RESTful API）
# - 静态文件缓存
# - 前端静态文件服务（从 /frontend-out 目录）
# ============================================================

server {
    listen 80;
    server_name localhost;
    root /www/wwwroot/ai-adventure/php-backend/public;
    index index.php index.html;

    # 字符编码
    charset utf-8;

    # 客户端上传文件大小限制
    client_max_body_size 20m;

    # ============================================================
    # API 路由 - 重写到 index.php
    # ============================================================
    location /api/ {
        # 先尝试匹配静态文件，不存在则重写到 index.php
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass unix:/tmp/php-cgi-74.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 120;
        }
    }

    # ============================================================
    # 前端静态文件服务（从 PWA 导出目录）
    # 将 /www/wwwroot/ai-adventure/frontend-out 作为前端根目录
    # ============================================================
    location / {
        # 优先尝试前端静态文件
        root /www/wwwroot/ai-adventure/frontend-out;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存（JS/CSS/图片等）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # HTML 文件不缓存（确保更新及时）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # manifest.json 和 sw.js 不缓存
        location = /manifest.json {
            expires -1;
            add_header Cache-Control "no-cache";
        }
        location = /sw.js {
            expires -1;
            add_header Cache-Control "no-cache";
        }
    }

    # ============================================================
    # PHP 文件处理（根目录）
    # ============================================================
    location ~ \.php$ {
        # 如果是前端目录下的 PHP 文件则跳过
        if ($uri ~ ^/api/) {
            break;
        }
        try_files $uri =404;
        fastcgi_pass unix:/tmp/php-cgi-74.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # ============================================================
    # 安全设置 - 禁止访问敏感文件
    # ============================================================
    location ~ /\. {
        deny all;
    }
    location ~* \.(sql|md|env|log|sh)$ {
        deny all;
    }
    location ~ /config/ {
        deny all;
    }
    location ~ /src/ {
        deny all;
    }
    location ~ /migrations/ {
        deny all;
    }

    # ============================================================
    # Gzip 压缩
    # ============================================================
    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    # ============================================================
    # 错误页面
    # ============================================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
}
