version: "3.9"

services:
  # ============================================
  # Next.js 前端服务
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3001/api
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # NestJS 后端服务
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    volumes:
      - backend_data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - JWT_SECRET=change-me-in-production
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - app-network

  # ============================================
  # Nginx 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped
    networks:
      - app-network

# ============================================
# 数据卷
# ============================================
volumes:
  backend_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  app-network:
    driver: bridge
